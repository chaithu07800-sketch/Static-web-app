name: Deploy Plain HTML to Azure
 
on:
  push:
    branches:
      - main  # Change to master if your friend's default branch is named master
 
jobs:
  deploy-html:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Upload HTML Files to Azure
        run: |
          az storage blob upload-batch \
            --account-name chaitu1 \
            --account-key '${{ secrets.AZURE_STORAGE_KEY }}' \
            --destination '$web' \
            --source .
