name: Deploy Static Web App via Marketplace
 
on:
  push:
    branches:
      - main
 
jobs:
  deploy-static-site:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
 
    - name: Deploy to Azure Storage
      uses: bacongobbler/azure-blob-storage-upload@v4.0.0
      with:
        source_dir: './Front end repo'                     
        container_name: '$web'              
        connection_string: ${{ secrets.AZURE_CONNECTION_KEY }}
        sync: true
